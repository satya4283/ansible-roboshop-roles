- name: app setup
  include_role:
    name: common
    tasks_from: app-setup

- name: nodejs setup
  include_role:
    name: common
    tasks_from: nodejs 

- name: systemd setup
  include_role:
    name: common
    tasks_from: systemd


- name: copy mongodb repo 
  ansible.builtin.copy:
    src: mongo.repo 
    dest: /etc/yum.repos.d/mongo.repo

- name: Install mongodb client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: check products loaded or not 
  ansible.builtin.command: mongosh --host {{ MONGODB_HOST }} --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output
  ignore_errors: true 

- name: print the catalogue output 
  ansible.builtin.debug:
    msg: "{{ catalogue_output }}"

- name: load products
  ansible.builtin.shell: "mongosh --host {{ MONGODB_HOST }} </app/db/master-data.js"
  when: catalogue_output.stdout | int < 0
  ignore_errors: true 

- name: systemd setup
  include_role:
    name: common
    tasks_from: systemd

- name: Deployment setup
  tags:
  - deployment
  include_role:
    name: common
    tasks_from: deployment